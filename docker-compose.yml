services:
  # ──────────────────────────────────────────────
  # MySQL 데이터베이스
  # ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: todo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: todo_db
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: todo_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "todo_user", "-ptodo_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - todo-network

  # ──────────────────────────────────────────────
  # FastAPI 백엔드
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: todo_password
      MYSQL_DATABASE: todo_db
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - todo-network

  # ──────────────────────────────────────────────
  # Vite + React 프론트엔드 (Nginx)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - todo-network

  # ──────────────────────────────────────────────
  # Prometheus
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: todo-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - todo-network

  # ──────────────────────────────────────────────
  # Grafana
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: todo-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - todo-network

  # ──────────────────────────────────────────────
  # Node Exporter (호스트 시스템 메트릭)
  # ──────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: todo-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - todo-network

  # ──────────────────────────────────────────────
  # MySQL Exporter (MySQL 메트릭)
  # ──────────────────────────────────────────────
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: todo-mysqld-exporter
    restart: unless-stopped
    volumes:
      - ./mysqld-exporter/.my.cnf:/etc/mysqld-exporter/.my.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysqld-exporter/.my.cnf"
      - "--collect.global_status"
      - "--collect.global_variables"
      - "--collect.info_schema.tables"
      - "--collect.info_schema.processlist"
      - "--collect.info_schema.innodb_metrics"
      - "--collect.slave_status"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9104:9104"
    networks:
      - todo-network

  # ──────────────────────────────────────────────
  # cAdvisor (컨테이너 메트릭)
  # ──────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: todo-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    ports:
      - "8080:8080"
    networks:
      - todo-network

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  todo-network:
    driver: bridge

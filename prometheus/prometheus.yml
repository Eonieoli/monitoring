global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # Prometheus 자기 자신 모니터링
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI 백엔드 메트릭
  - job_name: "todo-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Node Exporter - 호스트 시스템 메트릭 (CPU, Memory, Disk, Network)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "ubuntu-host"
    scrape_interval: 15s

  # MySQL Exporter - 데이터베이스 메트릭
  - job_name: "mysqld-exporter"
    static_configs:
      - targets: ["mysqld-exporter:9104"]
        labels:
          instance: "todo-mysql"
    scrape_interval: 15s

  # cAdvisor - 컨테이너 메트릭
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    metrics_path: "/metrics"
    scrape_interval: 15s
